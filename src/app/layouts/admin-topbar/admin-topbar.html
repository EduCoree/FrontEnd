<header class="w-full top-0 sticky z-40 bg-[#f8faf9]/70 backdrop-blur-xl flex justify-between items-center px-8 py-4">
  <div class="flex items-center gap-6 flex-1">
    <div class="relative w-full max-w-md">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#596060]">search</span>
      <input
        class="w-full bg-[#e4e9e8] border-none rounded-full py-2.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-[#2e6959]/20 placeholder:text-[#596060]/60 outline-none"
        [placeholder]="placeholder"
        type="text" />
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button class="w-10 h-10 rounded-full flex items-center justify-center text-emerald-700/70 hover:bg-emerald-50 transition-colors"
      [title]="'adminTopbar.notifications' | translate">
      <span class="material-symbols-outlined">notifications</span>
    </button>
    <button class="w-10 h-10 rounded-full flex items-center justify-center text-emerald-700/70 hover:bg-emerald-50 transition-colors"
      [title]="'adminTopbar.help' | translate">
      <span class="material-symbols-outlined">help</span>
    </button>
  </div>
</header>
