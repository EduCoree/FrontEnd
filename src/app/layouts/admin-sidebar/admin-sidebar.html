<!-- src/app/layouts/admin-sidebar/admin-sidebar.html -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-[#eaefee] flex flex-col py-8 z-50">

  <!-- Brand -->
  <div class="px-8 mb-12 pt-12">
    <!-- <div class="flex items-center gap-3 mb-1">
      <div class="w-10 h-10 rounded-lg bg-[#2e6959] flex items-center justify-center text-[#e4fff4]">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">school</span>
      </div>
      <h1 class="text-lg font-black text-emerald-900 tracking-tight font-headline">EduCore</h1>
    </div>
    <p class="uppercase tracking-widest text-[10px] font-bold text-emerald-800/60 pl-[52px]">Admin Portal</p> -->
  </div>

  <!-- Nav Links -->
  <nav class="flex-1 space-y-1 px-4">

    <a routerLink="/admin/courses"
      routerLinkActive="text-emerald-900 border-r-4 border-emerald-600 bg-[#f8faf9]"
      [routerLinkActiveOptions]="{ exact: false }"
      class="flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-emerald-900 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">school</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Courses</span>
    </a>

    <a routerLink="/admin/teachers"
      routerLinkActive="text-emerald-900 border-r-4 border-emerald-600 bg-[#f8faf9]"
      [routerLinkActiveOptions]="{ exact: false }"
      class="flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-emerald-900 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">person_4</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Teachers</span>
    </a>

    <a routerLink="/admin/students"
      routerLinkActive="text-emerald-900 border-r-4 border-emerald-600 bg-[#f8faf9]"
      [routerLinkActiveOptions]="{ exact: false }"
      class="flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-emerald-900 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">group</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Students</span>
    </a>

    <a routerLink="/admin/settings"
      routerLinkActive="text-emerald-900 border-r-4 border-emerald-600 bg-[#f8faf9]"
      class="flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-emerald-900 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">settings</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Settings</span>
    </a>
  </nav>

  <!-- Bottom: User + Logout -->
  <div class="px-4 pt-6 border-t border-emerald-800/10 space-y-1">
    <!-- Current user -->
    <div class="flex items-center gap-3 px-4 py-3 mb-2">
      <div class="w-8 h-8 rounded-full bg-[#2e6959] flex items-center justify-center text-[#e4fff4] text-xs font-bold shrink-0">
        {{ userInitials }}
      </div>
      <div class="overflow-hidden">
        <p class="text-xs font-bold text-emerald-900 truncate">{{ userName }}</p>
        <p class="text-[10px] text-emerald-800/50 uppercase tracking-widest">Administrator</p>
      </div>
    </div>

    <a href="#"
      class="flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-emerald-900 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">contact_support</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Support</span>
    </a>

    <button (click)="logout()"
      class="w-full flex items-center gap-4 px-4 py-3 rounded-l-xl text-emerald-800/60 hover:text-red-700 hover:translate-x-1 transition-all duration-300">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="uppercase tracking-widest text-[10px] font-bold">Logout</span>
    </button>
  </div>
</aside>
