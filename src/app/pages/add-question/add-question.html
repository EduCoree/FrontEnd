<div class="flex-1 p-10 bg-surface">
<!-- Breadcrumbs -->
<nav class="mb-8 flex items-center gap-2 ms-64 text-sm">
<span class="text-slate-400 font-label">Quizzes</span>
<span class="material-symbols-outlined text-slate-300 text-base" data-icon="chevron_right">chevron_right</span>
<span class="text-slate-400 font-label">Advanced UI Quiz</span>
<span class="material-symbols-outlined text-slate-300 text-base" data-icon="chevron_right">chevron_right</span>
<span class="text-primary font-bold font-label">Add Question</span>
</nav>
<div class="max-w-4xl mx-auto">
<div class="flex flex-col gap-8">
<!-- Heading Area -->
<div class="flex justify-between items-end">
<div>
<p class="text-xs font-bold text-primary tracking-widest uppercase mb-1 font-label">Question Editor</p>
<h3 class="text-3xl font-extrabold text-on-surface font-headline leading-tight">Create New Question</h3>
</div>
<div class="bg-primary-fixed-dim/20 text-on-primary-container px-4 py-1 rounded-full text-xs font-bold font-label">
                            Question #4
                        </div>
</div>
<!-- Main Form Card -->
<div class="bg-surface-container-lowest rounded-xl ambient-shadow p-8 flex flex-col gap-8">
<!-- Question Prompt -->
<div class="space-y-3">
<label class="text-xs font-bold text-slate-500 font-label tracking-wide">QUESTION PROMPT</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-5 focus:ring-2 focus:ring-primary-fixed-dim font-body text-lg min-h-[120px] resize-none placeholder:text-slate-400" placeholder="Enter your question text here...">How does the 'Digital Atrium' design system define boundary lines between content sections?</textarea>
</div>
<!-- Config Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-3">
<label class="text-xs font-bold text-slate-500 font-label tracking-wide">QUESTION TYPE</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg p-4 pr-10 focus:ring-2 focus:ring-primary-fixed-dim font-label appearance-none cursor-pointer">
<option selected="">Multiple Choice</option>
<option>True/False</option>
<option>Matching</option>
<option>Short Answer</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-3">
<label class="text-xs font-bold text-slate-500 font-label tracking-wide">POINTS</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary-fixed-dim font-label" type="number" value="10"/>
</div>
</div>
<!-- Answers Section -->
<div class="space-y-6">
<div class="flex justify-between items-center">
<label class="text-xs font-bold text-slate-500 font-label tracking-wide">ANSWER OPTIONS</label>
<span class="text-[10px] text-slate-400 font-label italic">Toggle radio to select the correct answer</span>
</div>
<div class="space-y-4">
<!-- Option 1 -->
<div class="group flex items-center gap-4 bg-surface-container-low/50 p-4 rounded-lg hover:bg-surface-container-low transition-colors">
<input checked="" class="w-5 h-5 text-primary border-none bg-surface-container-highest focus:ring-primary-fixed-dim" name="answer" type="radio"/>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body text-sm" type="text" value="Using background color shifts (e.g., surface-container-low) instead of 1px borders."/>
<button class="p-2 text-slate-300 hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Option 2 -->
<div class="group flex items-center gap-4 bg-surface-container-low/50 p-4 rounded-lg hover:bg-surface-container-low transition-colors">
<input class="w-5 h-5 text-primary border-none bg-surface-container-highest focus:ring-primary-fixed-dim" name="answer" type="radio"/>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body text-sm" type="text" value="Applying high-contrast black 1px solid borders to all containers."/>
<button class="p-2 text-slate-300 hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Option 3 -->
<div class="group flex items-center gap-4 bg-surface-container-low/50 p-4 rounded-lg hover:bg-surface-container-low transition-colors">
<input class="w-5 h-5 text-primary border-none bg-surface-container-highest focus:ring-primary-fixed-dim" name="answer" type="radio"/>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body text-sm" type="text" value="Using 4px thick solid lines to ensure high-end premium aesthetics."/>
<button class="p-2 text-slate-300 hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Option 4 -->
<div class="group flex items-center gap-4 bg-surface-container-low/50 p-4 rounded-lg hover:bg-surface-container-low transition-colors">
<input class="w-5 h-5 text-primary border-none bg-surface-container-highest focus:ring-primary-fixed-dim" name="answer" type="radio"/>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body text-sm" type="text" value="Boundary lines are prohibited entirely; only whitespace is used."/>
<button class="p-2 text-slate-300 hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Add Option -->
<button class="flex items-center gap-2 text-primary font-bold text-sm px-2 py-2 hover:bg-surface-container-low rounded-lg transition-colors font-label">
<span class="material-symbols-outlined text-lg" data-icon="add_circle">add_circle</span>
                                Add Option
                            </button>
</div>
</div>
<!-- Action Footer -->
<div class="flex items-center justify-end gap-6 pt-4">
<button class="text-slate-500 font-bold px-8 py-3 rounded-lg hover:bg-surface-container-high transition-colors font-label">
                            Cancel Changes
                        </button>
<button class="primary-gradient text-white font-bold px-10 py-3 rounded-lg ambient-shadow hover:brightness-110 active:scale-95 transition-all duration-150 font-label">Save Question</button>
</div>
</div>
</div>
</div>
