
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-on-surface/30 backdrop-blur-sm">
<!-- Modal Container -->
<div class="w-full max-w-lg glass-panel rounded-[24px] overflow-hidden shadow-[0_8px_32px_rgba(125,184,165,0.12)] mt-20">
<!-- Graphic Header -->
<div class="relative h-32 w-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center overflow-hidden">
<!-- Abstract visual element -->
<div class="absolute inset-0 opacity-20 ">
<div class="absolute -top-10 -right-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
</div>
<div class="relative bg-surface-container-lowest/20 p-4 rounded-full ">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl" data-icon="assignment_turned_in" style="font-variation-settings: 'FILL' 1;">assignment_turned_in</span>
</div>
</div>
<!-- Content Area -->
<div class="p-8 text-center bg-[#E7E7E7] ">
<h2 class="font-headline font-extrabold text-2xl text-on-surface mb-2 tracking-tight">Submit Quiz?</h2>
<p class="text-on-surface-variant text-sm mb-8 leading-relaxed">You are about to finalize your attempt. Please ensure all answers are correct before proceeding.</p>
<!-- Status Box -->
<div class="bg-surface-container-low rounded-xl p-5 mb-8 flex items-center justify-between text-left">
<div>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary mb-1 block">Completion Status</span>
<span class="font-headline font-bold text-lg text-on-surface">{{answeredCount}} of {{TotalQuestions}} questions answered</span>
</div>
<div class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3">
<button (click)="onConfirm()" [disabled]="submetting" class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold shadow-[0_4px_12px_rgba(46,104,88,0.2)] active:scale-95 transition-transform">
                        <span *ngIf="!submetting">Submit Now</span>
    <span *ngIf="submetting">Submitting...</span>
                    </button>
<button (click)="onCancel()" [disabled]="submetting" class="w-full py-4 px-6 rounded-xl bg-surface-container-high text-primary font-headline font-bold hover:bg-surface-container-highest transition-colors active:scale-95">
                        Go Back
                    </button>
</div>
</div>
<!-- Footer Decorative Element -->
<div class="h-1.5 w-full bg-surface-container">
<div class="h-full bg-primary w-full opacity-30"></div>
</div>
</div>
</div>
