<!-- Edit Course Shell — sidebar + topbar + child route outlet -->
<div class="ec-shell">

  <!-- ── Course Sidebar (fixed, left) ── -->
  <app-course-sidebar></app-course-sidebar>

  <!-- ── Page Body (scrollable main area) ── -->
  <div class="ec-body">

    <!-- Sticky sub-header for page actions -->
    <header class="ec-topbar">
      <button class="ec-back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
        <span>{{ 'editCourse.title' | translate }}</span>
      </button>

      <button
        class="ec-publish-btn"
        [class.ec-publish-btn--danger]="courseStatus() === 'Published'"
        (click)="courseStatus() === 'Published' ? unpublishCourse() : publishCourse()">
        <span class="material-symbols-outlined">
          {{ courseStatus() === 'Published' ? 'unpublished' : 'rocket_launch' }}
        </span>
        {{ (courseStatus() === 'Published' ? 'editCourse.unpublish' : 'editCourse.publishCourse') | translate }}
      </button>
    </header>

    <!-- Toast / success banner (for publish/unpublish actions) -->
    <div class="ec-toast" [class.ec-toast--visible]="shellSuccessMsg()">
      <span class="material-symbols-outlined">check_circle</span>
      {{ shellSuccessMsg() }}
    </div>

    <!-- Child route renders here (CourseInfoComponent, TeacherSessionsComponent, TeacherProgressComponent) -->
    <router-outlet></router-outlet>

  </div>
  <!-- END ec-body -->

</div>
<!-- END ec-shell -->
