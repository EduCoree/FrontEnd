@if (message().role === 'user') {
  <!-- User message — right-aligned -->
  <div class="flex items-end justify-end gap-2 group">
    <div class="flex flex-col items-end max-w-[80%]">
      <div class="chat-bubble chat-bubble--user"
           [class.chat-bubble--error]="message().isError">
        <p class="text-sm leading-relaxed whitespace-pre-wrap">{{ message().content }}</p>
      </div>
      <span class="text-[10px] text-outline mt-1 opacity-0 group-hover:opacity-100 transition-opacity">
        {{ message().createdAt | date:'shortTime' }}
      </span>
    </div>
    <div class="chat-avatar chat-avatar--user flex-shrink-0">
      {{ userInitial() }}
    </div>
  </div>
} @else {
  <!-- Assistant message — left-aligned -->
  <div class="flex items-end gap-2 group">
    <div class="chat-avatar chat-avatar--assistant flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    <div class="flex flex-col items-start max-w-[80%]">
      <div class="chat-bubble chat-bubble--assistant"
           [class.chat-bubble--error]="message().isError">
        <div class="text-sm leading-relaxed whitespace-pre-wrap assistant-content"
             [innerHTML]="formatContent(message().content)"></div>
      </div>
      <span class="text-[10px] text-outline mt-1 opacity-0 group-hover:opacity-100 transition-opacity">
        {{ message().createdAt | date:'shortTime' }}
      </span>
    </div>
  </div>
}
