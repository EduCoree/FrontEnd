<div class="chat-panel">
  <!-- Header -->
  <div class="chat-panel__header">
    <div class="flex items-center gap-2.5">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-on-surface leading-none">EduCore Assistant</h3>
        <span class="text-[10px] text-outline">Powered by AI</span>
      </div>
    </div>
    <div class="flex items-center gap-1">
      @if (chatService.hasMessages()) {
        <button
          (click)="clearHistory()"
          class="header-btn"
          id="chat-clear-btn"
          title="Clear conversation">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022 1.005 11.36c.076.854.758 1.514 1.615 1.514h6.732c.857 0 1.539-.66 1.615-1.514l1.005-11.36.149.022a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
          </svg>
        </button>
      }
      <button
        (click)="closed.emit()"
        class="header-btn"
        id="chat-close-btn"
        title="Close chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
          <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Messages Area -->
  <div #scrollContainer class="chat-panel__messages hide-scrollbar">
    @if (!chatService.hasMessages()) {
      <div class="empty-state">
        <div class="empty-state__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10">
            <path d="M4.913 2.658c2.075-.27 4.19-.408 6.337-.408 2.147 0 4.262.139 6.337.408 1.922.25 3.291 1.861 3.405 3.727a4.403 4.403 0 0 0-1.032-.211 50.89 50.89 0 0 0-8.42 0c-2.358.196-4.04 2.19-4.04 4.434v4.286a4.47 4.47 0 0 0 2.433 3.984L7.28 21.53A.75.75 0 0 1 6 21v-2.234a4.75 4.75 0 0 1-1.526-.776 4.485 4.485 0 0 1-1.566-3.578V6.385a4.505 4.505 0 0 1 2.005-3.727ZM11.84 9.63a49.403 49.403 0 0 1 7.92 0c1.36.113 2.24 1.269 2.24 2.578v4.286c0 1.31-.88 2.465-2.24 2.578a49.36 49.36 0 0 1-7.92 0c-1.36-.113-2.24-1.269-2.24-2.578v-4.286c0-1.31.88-2.465 2.24-2.578Z" />
          </svg>
        </div>
        <p class="text-sm font-semibold text-on-surface mt-3">Hi there! 👋</p>
        <p class="text-xs text-outline mt-1 max-w-[200px] text-center leading-relaxed">
          I'm your EduCore assistant. Ask me anything about your courses!
        </p>
      </div>
    }

    @for (msg of chatService.messages(); track msg.id) {
      <app-chat-message
        [message]="msg"
        [userInitial]="chatService.userInitial()" />
    }

    @if (chatService.isLoading()) {
      <div class="flex items-end gap-2">
        <div class="typing-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    }
  </div>

  <!-- Input Area -->
  <app-chat-input
    (messageSent)="onMessageSent($event)"
    [disabled]="chatService.isLoading()" />
</div>
