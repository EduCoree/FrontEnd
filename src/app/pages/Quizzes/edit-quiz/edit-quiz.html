
<div *ngIf="isLoading" class="px-8 py-10 space-y-8 animate-pulse">
  <div class="space-y-2">
    <div class="h-4 w-24 bg-slate-200 rounded"></div>
    <div class="h-14 w-full bg-slate-100 rounded-lg"></div>
  </div>

  <div class="grid grid-cols-2 gap-8">
    <div class="space-y-2">
      <div class="h-4 w-20 bg-slate-200 rounded"></div>
      <div class="h-14 w-full bg-slate-100 rounded-lg"></div>
    </div>
    <div class="space-y-2">
      <div class="h-4 w-20 bg-slate-200 rounded"></div>
      <div class="h-14 w-full bg-slate-100 rounded-lg"></div>
    </div>
  </div>
</div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-on-background/40 backdrop-blur-sm"></div>

  <!-- Modal Container -->
  <div class="relative w-full max-w-2xl bg-surface-container-lowest rounded-2xl shadow-[0_32px_64px_rgba(46,104,88,0.2)] overflow-hidden flex flex-col">
    
    <!-- Modal Header -->
    <div class="px-8 py-6 flex items-center justify-between bg-surface-container-low">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-white">quiz</span>
        </div>
        <h2 class="text-2xl font-bold font-headline text-on-surface">Edit Quiz Details</h2>
      </div>
      <button (click)="onCancel()" class="p-2 hover:bg-surface-container-high rounded-full transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </button>
    </div>
@if (isLoading) {
      <div class="px-8 py-10 space-y-8 animate-pulse">
        <div class="space-y-3">
          <div class="h-4 w-24 bg-slate-200 rounded"></div>
          <div class="h-14 w-full bg-slate-100 rounded-lg"></div>
        </div>
        <div class="grid grid-cols-2 gap-8">
          <div class="space-y-3"><div class="h-4 w-20 bg-slate-200 rounded"></div><div class="h-14 w-full bg-slate-100 rounded-lg"></div></div>
          <div class="space-y-3"><div class="h-4 w-20 bg-slate-200 rounded"></div><div class="h-14 w-full bg-slate-100 rounded-lg"></div></div>
        </div>
        <div class="flex justify-end gap-4 pt-10">
          <div class="h-12 w-24 bg-slate-100 rounded-lg"></div>
          <div class="h-12 w-32 bg-slate-200 rounded-lg"></div>
        </div>
      </div>
    }
    @else
    {
    <!-- Modal Body -->
    <form [formGroup]="quizForm" (ngSubmit)="onSave()">
      <div class="px-8 py-10 overflow-y-auto max-h-[618px] space-y-8">

        <!-- Title -->
        <div class="space-y-2">
          <label class="text-sm font-semibold text-primary font-headline flex items-center gap-1">
            Quiz Title <span class="text-error">*</span>
          </label>
          <input
            formControlName="title"
            type="text"
            placeholder="e.g., Advanced Quantum Mechanics Midterm"
            class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all font-medium"
          />
          <span class="text-xs text-error" *ngIf="quizForm.get('title')?.invalid && quizForm.get('title')?.touched">
            Title is required (max 160 characters)
          </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

          <!-- Time Limit -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-primary font-headline">Time Limit (Minutes)</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">timer</span>
              <input
                formControlName="timeLimitMins"
                type="number"
                placeholder="No limit"
                class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container rounded-lg pl-12 pr-4 py-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all font-medium"
              />
            </div>
          </div>

          <!-- Pass Score -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-primary font-headline">
              Pass Score (%) <span class="text-error">*</span>
            </label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">grade</span>
              <input
                formControlName="passScore"
                type="number"
                min="0"
                max="100"
                class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container rounded-lg pl-12 pr-4 py-4 text-on-surface transition-all font-medium"
              />
            </div>
            <span class="text-xs text-error" *ngIf="quizForm.get('passScore')?.invalid && quizForm.get('passScore')?.touched">
              Pass score must be between 0 and 100
            </span>
          </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

          <!-- Max Attempts -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-primary font-headline">Max Attempts</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">replay</span>
              <input
                formControlName="maxAttempts"
                type="number"
                min="1"
                max="10"
                class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-primary-container rounded-lg pl-12 pr-4 py-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all font-medium"
              />
            </div>
            <span class="text-xs text-error" *ngIf="quizForm.get('maxAttempts')?.invalid && quizForm.get('maxAttempts')?.touched">
              Max attempts must be between 1 and 10
            </span>
          </div>

          <!-- Is Randomized -->
          <div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
            <div class="space-y-0.5">
              <div class="text-sm font-bold text-on-surface">Is Randomized</div>
              <div class="text-xs text-on-surface-variant">Shuffle question order</div>
            </div>
            <button
  type="button"
  (click)="toggleRandomized()"
  class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200"
  [ngClass]="quizForm.get('isRandomized')?.value ? 'bg-primary-container/40' : 'bg-[#D1D8D8]'"
>
  <span class="sr-only">Toggle Randomization</span>
  <!-- Toggle Thumb -->
  <span
    class="inline-block h-4 w-4 transform rounded-full transition-transform duration-200"
    [ngClass]="quizForm.get('isRandomized')?.value ? 'translate-x-6 bg-primary' : 'translate-x-1 bg-[#b4bebe]'"
  ></span>
</button>
          </div>

        </div>

        <!-- Error Message -->
        <p class="text-sm text-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      </div>

      <!-- Modal Footer -->
      <div class="px-8 py-6 flex justify-end items-center gap-4 bg-surface-container-low border-t border-outline-variant/10">
        <button
          type="button"
          (click)="onCancel()"
          class="px-6 py-3 rounded-lg font-bold text-primary hover:bg-surface-container-high transition-all active:scale-95">
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSaving"
          class="px-8 py-3 bg-gradient-to-br from-primary to-primary-container text-white rounded-lg font-bold shadow-[0_8px_24px_rgba(46,104,88,0.25)] hover:shadow-[0_12px_32px_rgba(46,104,88,0.35)] transition-all active:scale-95 disabled:opacity-50">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>

    </form>
}
  </div>
</div>
