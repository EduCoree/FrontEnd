<!-- src/app/pages/login/login.html -->
<div class="min-h-screen bg-[#F8FAFA] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-2 text-3xl font-black text-[#2E6858] font-headline tracking-tight mb-2">
        <span class="material-symbols-outlined text-4xl">school</span>
        EduCore
      </div>
      <h1 class="text-2xl font-extrabold text-[#191C1D] font-headline mt-4">Welcome back</h1>
      <p class="text-[#707975] text-sm mt-2">Sign in to continue learning</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-[0_8px_32px_rgba(125,184,165,0.12)] p-8">

      @if (errorMsg()) {
        <div class="mb-6 flex items-center gap-3 px-4 py-3 bg-[#FFDAD6]/40 border border-[#BA1A1A]/20 rounded-xl text-[#BA1A1A] text-sm font-semibold">
          <span class="material-symbols-outlined text-[18px]">error</span>{{ errorMsg() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-[#191C1D] mb-2">Email</label>
          <div class="flex items-center gap-3 px-4 py-3 bg-[#F2F4F4] rounded-xl border border-transparent focus-within:border-[#2E6858] focus-within:bg-white transition-all">
            <span class="material-symbols-outlined text-[#707975] text-[18px]">mail</span>
            <input formControlName="email" type="email" placeholder="you@example.com"
              class="bg-transparent border-none focus:ring-0 flex-1 text-sm text-[#191C1D] placeholder-[#707975]" />
          </div>
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="mt-1 text-xs text-[#BA1A1A]">Please enter a valid email.</p>
          }
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-[#191C1D]">Password</label>
            <a routerLink="/forgot-password" class="text-xs text-[#2E6858] font-semibold hover:underline">Forgot password?</a>
          </div>
          <div class="flex items-center gap-3 px-4 py-3 bg-[#F2F4F4] rounded-xl border border-transparent focus-within:border-[#2E6858] focus-within:bg-white transition-all">
            <span class="material-symbols-outlined text-[#707975] text-[18px]">lock</span>
            <input formControlName="password" [type]="showPass() ? 'text' : 'password'" placeholder="••••••••"
              class="bg-transparent border-none focus:ring-0 flex-1 text-sm text-[#191C1D] placeholder-[#707975]" />
            <button type="button" (click)="showPass.set(!showPass())" class="text-[#707975] hover:text-[#2E6858] transition-colors">
              <span class="material-symbols-outlined text-[18px]">{{ showPass() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="form.invalid || loading()"
          class="w-full py-3.5 bg-gradient-to-br from-[#2E6858] to-[#7DB8A5] text-white font-bold rounded-xl shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 transition-all hover:shadow-lg active:scale-95 mt-2">
          @if (loading()) {
            <span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
          }
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-[#E1E3E3]"></div>
        <span class="text-xs text-[#707975]">or</span>
        <div class="flex-1 h-px bg-[#E1E3E3]"></div>
      </div>

      <p class="text-center text-sm text-[#404945]">
        Don't have an account?
        <a routerLink="/register" class="text-[#2E6858] font-bold hover:underline ml-1">Sign Up</a>
      </p>
    </div>
  </div>
</div>
