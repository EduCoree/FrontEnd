<main class="pt-8 pb-12 px-6 md:px-12 max-w-[1600px] mx-auto">

  <div class="flex flex-col lg:flex-row gap-12">

    <!-- Sidebar Filter -->
    <aside class="w-full lg:w-72 flex-shrink-0">
      <div class="bg-surface-container-low p-8 rounded-xl sticky top-28">

        <h3 class="font-bold uppercase tracking-[0.1em] text-xs text-primary mb-6">
          {{ 'courses.filter.title' | translate }}
        </h3>

        <!-- Search -->
        <div class="mb-8">
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3">
            {{ 'courses.filter.search' | translate }}
          </label>

          <input
            type="text"
            [(ngModel)]="filter.search"
            [placeholder]="'courses.filter.searchPlaceholder' | translate"
            class="w-full bg-surface-container rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/30"
          />
        </div>

        <!-- Level -->
        <div class="mb-8">
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3">
            {{ 'courses.filter.level' | translate }}
          </label>

          <div class="space-y-3">
            <label class="flex items-center gap-3 cursor-pointer group" *ngFor="let level of levels">
              <input
                type="radio"
                name="level"
                [value]="level"
                [(ngModel)]="filter.level"
                class="w-4 h-4 text-primary"
              />
              <span class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">
                {{ level }}
              </span>
            </label>

            <!-- Clear Level -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="level" value="" [(ngModel)]="filter.level" class="w-4 h-4 text-primary"/>
              <span class="text-sm font-medium text-on-surface-variant">
                {{ 'courses.filter.allLevels' | translate }}
              </span>
            </label>
          </div>
        </div>

        <!-- Pricing -->
        <div class="mb-8">
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3">
            {{ 'courses.filter.pricing' | translate }}
          </label>

          <div class="space-y-3">
            <label class="flex items-center gap-3 cursor-pointer group" *ngFor="let type of pricingTypes">
              <input
                type="radio"
                name="pricingType"
                [value]="type"
                [(ngModel)]="filter.pricingType"
                class="w-4 h-4 text-primary"
              />
              <span class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">
                {{ type }}
              </span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="pricingType" value="" [(ngModel)]="filter.pricingType" class="w-4 h-4 text-primary"/>
              <span class="text-sm font-medium text-on-surface-variant">
                {{ 'courses.filter.all' | translate }}
              </span>
            </label>
          </div>
        </div>

        <!-- Buttons -->
        <button
          (click)="applyFilters()"
          class="w-full py-3 bg-primary text-on-primary rounded-full font-bold text-sm hover:bg-primary-dim transition-all mb-3">
          {{ 'courses.filter.apply' | translate }}
        </button>

        <button
          (click)="resetFilters()"
          class="w-full py-3 bg-surface-container text-on-surface-variant rounded-full font-bold text-sm hover:bg-surface-container-high transition-all">
          {{ 'courses.filter.reset' | translate }}
        </button>

      </div>
    </aside>

    <!-- Courses Grid -->
    <div class="flex-1">

      <!-- Loading -->
      <div *ngIf="isLoading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <div *ngFor="let i of [1,2,3,4,5,6]"
          class="bg-surface-container-low rounded-lg aspect-[3/4] animate-pulse">
        </div>
      </div>

      <!-- Empty -->
      <div *ngIf="!isLoading && courses.length === 0"
        class="flex flex-col items-center justify-center py-24 text-center">
        <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">search_off</span>

        <h3 class="text-xl font-bold text-on-surface mb-2">
          {{ 'courses.empty.title' | translate }}
        </h3>

        <p class="text-on-surface-variant text-sm">
          {{ 'courses.empty.subtitle' | translate }}
        </p>
      </div>

      <!-- Grid -->
      <div *ngIf="!isLoading && courses.length > 0"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <app-course-card
          *ngFor="let course of courses"
          [course]="course">
        </app-course-card>
      </div>

      <!-- Pagination -->
      <div *ngIf="totalPages > 1" class="flex justify-center items-center gap-2 mt-12">
        <button
          (click)="goToPage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="p-2 rounded-full hover:bg-surface-container disabled:opacity-30 transition-all">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>

        <button
          *ngFor="let page of [].constructor(totalPages); let i = index"
          (click)="goToPage(i + 1)"
          [class]="(i + 1) === currentPage
            ? 'w-10 h-10 rounded-full bg-primary text-on-primary font-bold text-sm'
            : 'w-10 h-10 rounded-full hover:bg-surface-container text-on-surface-variant font-bold text-sm transition-all'">
          {{ i + 1 }}
        </button>

        <button
          (click)="goToPage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="p-2 rounded-full hover:bg-surface-container disabled:opacity-30 transition-all">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>

    </div>
  </div>
</main>
