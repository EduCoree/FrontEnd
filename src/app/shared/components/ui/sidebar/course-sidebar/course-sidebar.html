<!-- =====================================================
     RESPONSIVE SIDEBAR — drop-in component
     Requirements:
       1. Tailwind CSS loaded
       2. Material Symbols Outlined loaded
       3. Paste the <script> block below once per page
===================================================== -->

<!-- ── Mobile Top Bar (visible only < md) ─────────── -->
<header class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-4 py-3
               bg-[#F2F4F4] border-b border-slate-200 md:hidden">
  <button id="sidebar-open-btn" class="p-1.5 rounded-lg text-slate-600 hover:bg-white transition">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-lg">school</span>
    </div>
    <span class="text-lg font-black text-primary">EduCore</span>
  </div>
  <!-- placeholder so logo stays centered -->
  <div class="w-9"></div>
</header>

<!-- ── Dark overlay (mobile only) ─────────────────── -->
<div id="sidebar-overlay"
     class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"
     aria-hidden="true"></div>

<!-- ── Sidebar ─────────────────────────────────────── -->
<aside id="sidebar"
  class="h-screen w-64 fixed left-0 top-0 bg-[#F2F4F4] flex flex-col p-6 space-y-8 z-40 pt-28
         -translate-x-full md:translate-x-0
         transition-transform duration-300 ease-in-out">

  <div class="flex flex-col gap-2">
    <div class="flex items-center gap-3 px-2">
      <div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">school</span>
      </div>
      <div>
        <div class="text-xl font-black text-primary">EduCore</div>
        <div class="text-xs text-slate-500 font-medium">Teacher Portal</div>
      </div>
    </div>
  </div>

  <nav class="flex-grow flex flex-col gap-2">
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-white hover:text-primary transition-all rounded-lg text-sm font-medium">
      <span class="material-symbols-outlined">info</span>
      Course Information
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-white hover:text-primary transition-all rounded-lg text-sm font-medium">
      <span class="material-symbols-outlined">account_tree</span>
      Curriculum Builder
    </a>
    <!-- ACTIVE -->
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-primary font-bold bg-white rounded-lg shadow-sm text-sm">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">quiz</span>
      Quizzes
    </a>
  </nav>

  <button class="w-full py-3 bg-gradient-to-br from-primary to-primary-container text-white rounded-lg font-semibold text-sm">
    Create New Course
  </button>

  <div class="pt-4 border-t border-slate-200">
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-red-50 hover:text-red-600 rounded-lg text-sm font-medium transition-all">
      <span class="material-symbols-outlined">logout</span>
      Logout
    </a>
  </div>
</aside>

<!-- ── Sidebar JS (paste once, works for every page) ── -->
<script>
  (() => {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const openBtn = document.getElementById('sidebar-open-btn');

    const open  = () => { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
    const close = () => { sidebar.classList.add('-translate-x-full');    overlay.classList.add('hidden'); }

    openBtn?.addEventListener('click', open);
    overlay.addEventListener('click', close);

    // close sidebar when navigating (optional)
    sidebar.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      if (window.innerWidth < 768) close();
    }));
  })();
</script>
