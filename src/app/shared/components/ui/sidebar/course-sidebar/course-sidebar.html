<aside [class.w-64]="isOpen()"
       [class.w-16]="!isOpen()"
       class="hidden lg:flex flex-col fixed left-0 top-20 h-[calc(100vh-5rem)] bg-surface-container-low border-r border-outline-variant/20 z-50 transition-all duration-300">

  <!-- Header -->
  <div class="flex items-center gap-3 p-4 border-b border-outline-variant/20"
       [class.justify-between]="isOpen()"
       [class.justify-center]="!isOpen()">
    @if (isOpen()) {
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-on-primary text-lg">school</span>
        </div>
        <div>
          <p class="text-sm font-bold text-on-surface">EduCore</p>
          <p class="text-[10px] text-on-surface-variant">{{ 'sidebar.adminPanel' | translate }}</p>
        </div>
      </div>
    }
    <button (click)="toggle()"
            class="w-8 h-8 rounded-lg hover:bg-surface-container flex items-center justify-center transition-colors flex-shrink-0">
      <span class="material-symbols-outlined text-on-surface-variant text-lg">
        {{ isOpen() ? 'chevron_left' : 'chevron_right' }}
      </span>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive #rla="routerLinkActive"
         [routerLinkActiveOptions]="{ exact: item.exact }"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors group"
         [class.bg-primary]="rla.isActive"
         [class.text-on-primary]="rla.isActive"
         [class.hover:bg-surface-container]="!rla.isActive"
         [class.text-on-surface-variant]="!rla.isActive"
         [class.justify-center]="!isOpen()">
        <span class="material-symbols-outlined text-xl flex-shrink-0"
              [class.text-on-primary]="rla.isActive"
              [class.text-primary]="!rla.isActive">
          {{ item.icon }}
        </span>
        @if (isOpen()) {
          <span class="text-sm font-medium whitespace-nowrap">
            {{ item.labelKey | translate }} <!-- ✅ -->
          </span>
        }
      </a>
    }
  </nav>

  <!-- Footer -->
  @if (isOpen()) {
    <div class="p-4 border-t border-outline-variant/20">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container text-xs font-bold flex-shrink-0">
          AU
        </div>
        <div>
          <p class="text-xs font-bold text-on-surface">{{ 'sidebar.adminUser' | translate }}</p>
          <p class="text-[10px] text-on-surface-variant">{{ 'sidebar.superAdmin' | translate }}</p>
        </div>
      </div>
    </div>
  }
</aside>

<div [class.ml-64]="isOpen()"
     [class.ml-16]="!isOpen()"
     class="transition-all duration-300 lg:block hidden h-0">
</div>
