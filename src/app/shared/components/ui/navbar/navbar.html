<header class="fixed top-0 w-full z-50 bg-[#F8FAFA]/80 glass-nav shadow-[0_8px_32px_rgba(125,184,165,0.12)]">
  <div class="flex justify-between items-center px-8 h-20 max-w-7xl mx-auto">
    <div class="flex items-center gap-8">
      <div class="text-2xl font-black text-primary flex items-center gap-2 font-headline tracking-tight">
        <span class="material-symbols-outlined">school</span>
        <span>EduCore</span>
      </div>

      <nav class="hidden md:flex gap-6 items-center">
        <a class="text-primary font-bold border-b-2 border-primary transition-colors duration-300 " routerLink="/home">
          Home
        </a>
        <a class="text-slate-600 font-medium hover:text-primary-container transition-colors duration-300" href="#" >
          Courses
        </a>
        <a class="text-slate-600 font-medium hover:text-primary-container transition-colors duration-300" routerLink="centers/:id">
          Centers
        </a>
        <a class="text-slate-600 font-medium hover:text-primary-container transition-colors duration-300" href="#">
          Live Sessions
        </a>
      </nav>
    </div>

    <div class="flex items-center gap-6">
      <div class="hidden lg:flex items-center bg-surface-container-low px-4 py-2 rounded-xl gap-2 focus-within:ring-2 ring-primary-container/30 transition-all">
        <span class="material-symbols-outlined text-slate-400 text-sm">search</span>
        <input
          class="bg-transparent border-none outline-none text-sm w-48 placeholder-slate-400"
          placeholder="Search courses..."
          type="text"
        />
      </div>

      <div class="flex items-center gap-3">
        <button class="px-5 py-2.5 text-primary font-semibold hover:bg-primary-container/10 rounded-lg transition-colors">
          Login
        </button>
        <button class="px-6 py-2.5 bg-gradient-to-br from-[#2e6858] to-[#7db8a5] text-white font-bold rounded-lg scale-95 active:scale-100 transition-transform">
          Sign Up
        </button>
      </div>
    </div>
  </div>
</header>
